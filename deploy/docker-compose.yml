# Full stack: Postgres + API + web (nginx). Single-owner self-host.
#   docker compose --project-directory deploy up -d --build --remove-orphans
# Build context is the repo root so Dockerfiles can copy backend/ and frontend/.
#
# Explicit project name so this stack never collides with docker-compose.dev.yml. Both files
# live in deploy/, so without this they would share the directory-derived project name and the
# same `postgres` service — bringing this up would recreate the dev container `cmgr-postgres-dev`.
name: cmgr

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmgr
      POSTGRES_PASSWORD: cmgr
      POSTGRES_DB: commission_manager
    volumes:
      - cmgr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmgr -d commission_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    environment:
      CMGR_DATABASE_URL: postgresql+psycopg://cmgr:cmgr@postgres:5432/commission_manager
      CMGR_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      CMGR_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      CMGR_SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      CMGR_ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      CMGR_STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      CMGR_STORAGE_LOCAL_ROOT: /data/storage
      # Object storage + CDN (only used when STORAGE_BACKEND=s3); empty values
      # are treated as unset by the backend.
      CMGR_STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      CMGR_STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      CMGR_STORAGE_S3_REGION: ${STORAGE_S3_REGION:-auto}
      CMGR_STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-}
      CMGR_STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-}
      CMGR_STORAGE_CDN_BASE_URL: ${STORAGE_CDN_BASE_URL:-}
      CMGR_STORAGE_SIGNED_URL_TTL: ${STORAGE_SIGNED_URL_TTL:-600}
      CMGR_CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:${APP_PORT:-8080}"]}
    volumes:
      # Relative to deploy/docker-compose.yml: store uploaded files under repo-root data/storage.
      - ../data/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  cmgr_pgdata:
